name: Deploy cactus.watch

on:
  push:
    branches: [main]
    paths:
      - "tools/bill-tracker/frontend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync index.html from cactus-watch.html
        run: cp tools/bill-tracker/frontend/cactus-watch.html tools/bill-tracker/frontend/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy tools/bill-tracker/frontend --project-name=cactus-watch --branch=main --commit-dirty=true

      - name: Purge CDN cache
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ vars.CLOUDFLARE_ZONE_ID_CACTUS_WATCH }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_CACHE_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything": true}'
